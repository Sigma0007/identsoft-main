services:
  - type: web
    name: identsoft
    env: php
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan config:clear && php artisan cache:clear
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stack
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
